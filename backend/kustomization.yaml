# Production Beta topology: backing services plus 8 physical backend units that
# host the 15 logical NexusPaas services. The dev k3s kustomization under
# deploy/k3s intentionally keeps the all-in-one platform runtime for local smoke
# work.
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: nexuspaas
resources:
  - deploy/k3s/namespace.yaml
  - deploy/k3s/production-beta/runtime-config.yaml
  - deploy/k3s/production-beta/runtime-secret-contract.yaml
  - deploy/k3s/coturn.yaml
  - deploy/k3s/postgres.yaml
  - deploy/k3s/redis.yaml
  - deploy/k3s/minio.yaml
  - deploy/k3s/dex.yaml
  - deploy/k3s/production-beta/backend-units.yaml
patches:
  - path: deploy/k3s/production-beta/backing-secret-postgres-patch.yaml
  - path: deploy/k3s/production-beta/backing-secret-dex-patch.yaml
  - path: deploy/k3s/production-beta/backing-secret-minio-patch.yaml
