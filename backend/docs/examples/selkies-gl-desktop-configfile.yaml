# Streaming workload INPUT example.
#
# Submit this ConfigFile (your own app image), then submit the job with
# streaming_session=true, gpu_count=1, sm_percentage=<share>, and
# pinned_memory_limit=<limit>. You do NOT add Selkies here: at dispatch the
# platform auto-injects the `selkies` sidecar (from STREAM_SIDECAR_IMAGE), the
# shared /tmp/.X11-unix + /dev/shm volumes, and DISPLAY=:0 on this container.
# The nvidia.com/gpu marker below triggers the existing DRA + NVIDIA MPS path;
# the injected sidecar shares the same MPS claim.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: my-gpu-app
  labels:
    app.kubernetes.io/name: my-gpu-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: my-gpu-app
  template:
    metadata:
      labels:
        app.kubernetes.io/name: my-gpu-app
    spec:
      automountServiceAccountToken: false
      containers:
        - name: app
          # Your unchanged application image — renders into DISPLAY :0.
          image: registry.example.com/nexuspaas/my-gpu-app:1.0.0
          resources:
            requests:
              cpu: "1"
              memory: 2Gi
              ephemeral-storage: 1Gi
              nvidia.com/gpu: "1"
            limits:
              cpu: "4"
              memory: 8Gi
              ephemeral-storage: 4Gi
              nvidia.com/gpu: "1"
