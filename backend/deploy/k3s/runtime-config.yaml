# Dev-only runtime config. Real clusters should replace this ConfigMap with
# managed Secret/config sources and production-grade HTTPS issuer URLs.
apiVersion: v1
kind: ConfigMap
metadata:
  name: platform-runtime-config
data:
  REDIS_URL: "redis://redis:6379/0"
  EVENT_BUS_URL: "redis://redis:6379/1"
  JWT_AUDIENCE: "platform"
  STREAM_TURN_URIS: ""
  STREAM_TURN_CREDENTIAL_TTL: "8h"
  STREAM_MAX_BITRATE_KBPS: "12000"
  STREAM_MAX_CONCURRENT_SESSIONS: "64"
  STREAM_EGRESS_BUDGET_KBPS: "800000"
