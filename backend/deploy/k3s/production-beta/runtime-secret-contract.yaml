apiVersion: v1
kind: ConfigMap
metadata:
  name: production-beta-runtime-secret-contract
  labels:
    app.kubernetes.io/name: nexuspaas
    app.kubernetes.io/component: runtime-secret-contract
data:
  runtime-secrets.md: |
    # NexusPaas Production Beta Runtime Secret Contract

    This ConfigMap is documentation only. Do not place secret values here.
    Operators should create Kubernetes Secrets or ExternalSecret-managed
    Secrets before applying this kustomization.

    Shared backing-service secrets:
    - `postgres-password`: `password`
    - `dex-password`: `bcrypt-hash`
    - `minio-credentials`: `access-key`, `secret-key`
    - `coturn-runtime-secret`: `TURN_STATIC_AUTH_SECRET`, optional `TURN_REALM`

    Each service below expects a `<service>-runtime-secret` Secret. Common
    required keys:
    - `DATABASE_URL`
    - `API_KEYS` and `API_KEY_PRINCIPALS`, or `JWT_JWKS_URL`, `JWT_ISSUER`, and
      `JWT_AUDIENCE`
    - `SERVICE_API_KEY`

    Services other than `authorization-policy-service` also require:
    - `AUTHORIZATION_POLICY_URL`
    - `AUTHORIZATION_POLICY_API_KEY`

    `media-upload-service-runtime-secret` additionally requires:
    - `OBJECT_STORE_ACCESS_KEY`
    - `OBJECT_STORE_SECRET_KEY`

    Streaming TURN credentials:
    - Set `STREAM_TURN_URIS` in runtime config to enable
      `/api/v1/stream/credentials`.
    - `workload-service-runtime-secret` must include
      `STREAM_TURN_SHARED_SECRET` when `STREAM_TURN_URIS` is set.
    - `STREAM_TURN_SHARED_SECRET` and `coturn-runtime-secret`
      `TURN_STATIC_AUTH_SECRET` must come from the same secret value.

    Runtime secret names:
    - `audit-compliance-service-runtime-secret`
    - `authorization-policy-service-runtime-secret`
    - `ide-service-runtime-secret`
    - `identity-service-runtime-secret`
    - `image-registry-service-runtime-secret`
    - `integration-proxy-service-runtime-secret`
    - `k8s-control-service-runtime-secret`
    - `media-upload-service-runtime-secret`
    - `org-project-service-runtime-secret`
    - `platform-gateway-runtime-secret`
    - `request-notification-service-runtime-secret`
    - `scheduler-quota-service-runtime-secret`
    - `storage-service-runtime-secret`
    - `usage-observability-service-runtime-secret`
    - `workload-service-runtime-secret`
