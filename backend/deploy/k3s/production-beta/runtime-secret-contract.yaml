apiVersion: v1
kind: ConfigMap
metadata:
  name: production-beta-runtime-secret-contract
  labels:
    app.kubernetes.io/name: nexuspaas
    app.kubernetes.io/component: runtime-secret-contract
data:
  runtime-secrets.md: |
    # NexusPaas Production Beta Runtime Secret Contract

    This ConfigMap is documentation only. Do not place secret values here.
    Operators should create Kubernetes Secrets or ExternalSecret-managed
    Secrets before applying this kustomization.

    Shared backing-service secrets:
    - `postgres-password`: `password`
    - `dex-password`: `bcrypt-hash`
    - `minio-credentials`: `access-key`, `secret-key`
    - `coturn-runtime-secret`: `TURN_STATIC_AUTH_SECRET`, optional `TURN_REALM`

    Each deployable unit below expects a `<unit>-runtime-secret` Secret. Common
    required keys:
    - `DATABASE_URL`
    - `API_KEYS` and `API_KEY_PRINCIPALS`, or `JWT_JWKS_URL`, `JWT_ISSUER`, and
      `JWT_AUDIENCE`
    - `SERVICE_API_KEY`

    Units other than `iam-unit` also require:
    - `AUTHORIZATION_POLICY_URL`
    - `AUTHORIZATION_POLICY_API_KEY`

    `collaboration-unit-runtime-secret` additionally requires:
    - `OBJECT_STORE_ACCESS_KEY`
    - `OBJECT_STORE_SECRET_KEY`

    Streaming TURN credentials:
    - Set `STREAM_TURN_URIS` in runtime config to enable
      `/api/v1/stream/credentials`.
    - `compute-api-runtime-secret` must include
      `STREAM_TURN_SHARED_SECRET` when `STREAM_TURN_URIS` is set.
    - `STREAM_TURN_SHARED_SECRET` and `coturn-runtime-secret`
      `TURN_STATIC_AUTH_SECRET` must come from the same secret value.

    Harbor image registry integration:
    - Set non-secret `HARBOR_URL` in runtime config to the Harbor service root.
    - For private Harbor APIs, place `ADAPTER_CONFIG` in the image-registry
      hosting unit runtime secret (`platform-io-unit-runtime-secret` in the
      8-unit topology, or `image-registry-service-runtime-secret` in the
      single-service topology). The value is JSON for the existing `harbor`
      adapter, for example `add_prefix: /api/v2.0` plus an upstream auth block.
    - Do not place Harbor passwords, tokens, Basic auth payloads, or Docker
      config JSON in ConfigMaps.

    Runtime secret names:
    - `platform-gateway-runtime-secret`
    - `iam-unit-runtime-secret`
    - `tenant-unit-runtime-secret`
    - `collaboration-unit-runtime-secret`
    - `platform-io-unit-runtime-secret`
    - `usage-observability-runtime-secret`
    - `compute-api-runtime-secret`
    - `compute-control-plane-runtime-secret`
