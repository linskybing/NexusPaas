# P0-4: dedicated identity for the only unit that touches the Kubernetes API.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: compute-control-plane
  namespace: nexuspaas
  labels: {app: compute-control-plane}
automountServiceAccountToken: false
---
# Least-privilege, wildcard-free ClusterRole enumerating exactly the resources and
# verbs the cluster client uses (namespaces are cluster-scoped and workloads span
# many project namespaces, so this must be cluster-scoped). (P0-4)
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: compute-control-plane
  labels: {app: compute-control-plane}
rules:
  - apiGroups: [""]
    resources: [namespaces]
    verbs: [get, list, create]
  - apiGroups: [""]
    resources: [pods]
    verbs: [get, list, create, delete]
  - apiGroups: [""]
    resources: [pods/log]
    verbs: [get]
  - apiGroups: [""]
    resources: [configmaps, services]
    verbs: [create, list, delete]
  - apiGroups: [""]
    resources: [secrets]
    verbs: [create]
  - apiGroups: [""]
    resources: [nodes]
    verbs: [list]
  - apiGroups: [apps]
    resources: [deployments]
    verbs: [create, list, delete]
  - apiGroups: [apps]
    resources: [statefulsets]
    verbs: [list, delete]
  - apiGroups: [batch]
    resources: [jobs]
    verbs: [get, list, create, delete]
  - apiGroups: [batch]
    resources: [cronjobs]
    verbs: [get, create, update]
  - apiGroups: [networking.k8s.io]
    resources: [ingresses]
    verbs: [create]
  - apiGroups: [scheduling.k8s.io]
    resources: [priorityclasses]
    verbs: [get, create, update, delete]
  - apiGroups: [batch.volcano.sh]
    resources: [jobs]
    verbs: [create, list, delete]
  - apiGroups: [scheduling.volcano.sh]
    resources: [podgroups, queues]
    verbs: [list, delete]
  - apiGroups: [resource.k8s.io]
    resources: [resourceclaims, resourceclaimtemplates]
    verbs: [create, list, delete]
  - apiGroups: [longhorn.io]
    resources: [volumes, snapshots]
    verbs: [get, list, update]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: compute-control-plane
  labels: {app: compute-control-plane}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: compute-control-plane
subjects:
  - kind: ServiceAccount
    name: compute-control-plane
    namespace: nexuspaas
---
# Cluster-requiring units (authorization-policy, storage, resourcehours,
# workload/ide) fail /readyz closed without cluster access. Readiness pings the
# API server with a namespace list (cluster/health.go), so each such unit gets a
# dedicated identity bound to this single-rule role. Verbs beyond readiness stay
# unit-specific (compute-control-plane) or deliberately ungranted — runtime
# workers degrade per-operation instead of holding broad rights.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: nexuspaas-cluster-readiness
  labels: {app.kubernetes.io/name: nexuspaas}
rules:
  - apiGroups: [""]
    resources: [namespaces]
    verbs: [list]
---
