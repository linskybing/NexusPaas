apiVersion: apps/v1
kind: Deployment
metadata:
  name: platform-gateway
  labels: {app: platform-gateway}
spec:
  replicas: 1
  selector: {matchLabels: {app: platform-gateway}}
  template:
    metadata:
      labels: {app: platform-gateway}
    spec:
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        runAsGroup: 10001
        fsGroup: 10001
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: app
          image: nexuspaas-backend:v0.1.0
          imagePullPolicy: IfNotPresent
          envFrom:
            - configMapRef: {name: platform-gateway-config}
            - configMapRef: {name: production-beta-runtime-config, optional: true}
            - secretRef: {name: platform-gateway-runtime-secret}
          ports: [{containerPort: 8080}]
          livenessProbe: {httpGet: {path: /healthz, port: 8080}}
          readinessProbe: {httpGet: {path: /readyz, port: 8080}}
          startupProbe: {httpGet: {path: /healthz, port: 8080}, failureThreshold: 30, periodSeconds: 2}
          resources:
            requests: {cpu: 100m, memory: 128Mi, ephemeral-storage: 256Mi}
            limits: {cpu: 500m, memory: 512Mi, ephemeral-storage: 1Gi}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
---
