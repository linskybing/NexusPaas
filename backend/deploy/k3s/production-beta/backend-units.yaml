apiVersion: apps/v1
kind: Deployment
metadata:
  name: collaboration-unit
  labels: {app: collaboration-unit}
spec:
  replicas: 2
  selector: {matchLabels: {app: collaboration-unit}}
  template:
    metadata:
      labels: {app: collaboration-unit}
    spec:
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        runAsGroup: 10001
        fsGroup: 10001
        seccompProfile:
          type: RuntimeDefault
      initContainers:
        - name: ensure-object-store-bucket
          image: nexuspaas-backend:v0.1.0
          imagePullPolicy: IfNotPresent
          env:
            - {name: ADMIN_TASK, value: ensure-object-store-bucket}
            - {name: OBJECT_STORE_SCHEME, value: "http"}
            - {name: OBJECT_STORE_URL, value: "$(OBJECT_STORE_SCHEME)://minio:9000"}
          envFrom:
            - configMapRef: {name: collaboration-unit-config}
            - configMapRef: {name: production-beta-runtime-config, optional: true}
            - secretRef: {name: collaboration-unit-runtime-secret}
          resources:
            requests: {cpu: 100m, memory: 128Mi, ephemeral-storage: 256Mi}
            limits: {cpu: 500m, memory: 512Mi, ephemeral-storage: 1Gi}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
      containers:
        - name: app
          image: nexuspaas-backend:v0.1.0
          imagePullPolicy: IfNotPresent
          env:
            - {name: OBJECT_STORE_SCHEME, value: "http"}
            - {name: OBJECT_STORE_URL, value: "$(OBJECT_STORE_SCHEME)://minio:9000"}
          envFrom:
            - configMapRef: {name: collaboration-unit-config}
            - configMapRef: {name: production-beta-runtime-config, optional: true}
            - secretRef: {name: collaboration-unit-runtime-secret}
          ports: [{containerPort: 8080}]
          livenessProbe: {httpGet: {path: /healthz, port: 8080}}
          readinessProbe: {httpGet: {path: /readyz, port: 8080}}
          startupProbe: {httpGet: {path: /healthz, port: 8080}, failureThreshold: 30, periodSeconds: 2}
