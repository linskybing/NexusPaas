apiVersion: v1
kind: ConfigMap
metadata:
  name: platform-gateway-config
  labels: {app: platform-gateway}
data:
  SERVICE_NAME: "platform-gateway"
  HTTP_ADDR: ":8080"
  REQUIRE_AUTH: "true"
  PRODUCTION: "true"
  APP_ENV: "production"
  LOG_LEVEL: "info"
  OTEL_EXPORTER_OTLP_ENDPOINT: "http://otel-collector.observability.svc.cluster.local:4318" # NOSONAR S5332: in-cluster OTLP; collector serves plaintext 4318 (no TLS listener), intra-cluster transport security is a mesh/NetworkPolicy concern
  K8S_IMAGE_CHECK_ENABLED: "true"
  IMAGE_PUBLISH_REQUIRE_PROVENANCE: "true"
  OTEL_SERVICE_NAME: "platform-gateway"
  OTEL_TRACES_SAMPLER: "parentbased_traceratio"
  OTEL_TRACES_SAMPLER_ARG: "0.1"
  OTEL_RESOURCE_ATTRIBUTES: "service.namespace=nexuspaas,deployment.environment=production"
---
