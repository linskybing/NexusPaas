apiVersion: v1
kind: ConfigMap
metadata:
  name: production-beta-runtime-config
  labels:
    app.kubernetes.io/name: nexuspaas
    app.kubernetes.io/component: shared-runtime-config
data:
  REDIS_URL: "redis://redis:6379/0"
  EVENT_BUS_URL: "redis://redis:6379/1"
  JWT_AUDIENCE: "platform"
  STREAM_TURN_URIS: ""
  STREAM_TURN_CREDENTIAL_TTL: "8h"
  STREAM_MAX_BITRATE_KBPS: "12000"
  STREAM_MAX_CONCURRENT_SESSIONS: "64"
  STREAM_EGRESS_BUDGET_KBPS: "800000"
  SERVICE_URLS: >-
    {"audit-compliance-service":"http://collaboration-unit","authorization-policy-service":"http://iam-unit","ide-service":"http://compute-api","identity-service":"http://iam-unit","image-registry-service":"http://platform-io-unit","integration-proxy-service":"http://platform-io-unit","k8s-control-service":"http://compute-control-plane","media-upload-service":"http://collaboration-unit","org-project-service":"http://tenant-unit","platform-gateway":"http://platform-gateway","request-notification-service":"http://collaboration-unit","scheduler-quota-service":"http://compute-control-plane","storage-service":"http://platform-io-unit","usage-observability-service":"http://usage-observability","workload-service":"http://compute-api"}
