apiVersion: apps/v1
kind: Deployment
metadata:
  name: coturn
  labels: {app: coturn}
spec:
  replicas: 1
  selector: {matchLabels: {app: coturn}}
  template:
    metadata:
      labels: {app: coturn}
    spec:
      hostNetwork: true
      dnsPolicy: ClusterFirstWithHostNet
      automountServiceAccountToken: false
      containers:
        - name: coturn
          image: coturn/coturn:4.6.3
          imagePullPolicy: IfNotPresent
          command: ["/bin/sh", "-ec"]
          args:
            - >
              exec turnserver
              --listening-ip=0.0.0.0
              --listening-port=3478
              --min-port=49152
              --max-port=49252
              --use-auth-secret
              --static-auth-secret="$TURN_STATIC_AUTH_SECRET"
              --realm="${TURN_REALM:-nexuspaas.local}"
              --fingerprint
              --no-cli
              --no-multicast-peers
              --no-software-attribute
              --userdb=/tmp/turnserver-turndb
              --pidfile=/tmp/turnserver.pid
              --log-file=stdout
              --prometheus
          env:
            - name: TURN_STATIC_AUTH_SECRET
              valueFrom:
                secretKeyRef:
                  name: coturn-runtime-secret
                  key: TURN_STATIC_AUTH_SECRET
            - name: TURN_REALM
              valueFrom:
                secretKeyRef:
                  name: coturn-runtime-secret
                  key: TURN_REALM
                  optional: true
          ports:
            - {name: turn-udp, containerPort: 3478, protocol: UDP}
            - {name: metrics, containerPort: 9641, protocol: TCP}
          resources:
            requests: {cpu: 100m, memory: 128Mi, ephemeral-storage: 128Mi}
            limits: {cpu: 500m, memory: 512Mi, ephemeral-storage: 512Mi}
          volumeMounts:
            - {name: tmp, mountPath: /tmp}
          securityContext:
            # turnserver binary carries vestigial file-caps; no_new_privs (from
            # allowPrivilegeEscalation:false) makes the kernel refuse to exec it (EPERM).
            # Port 3478 is unprivileged so no cap is actually needed.
            allowPrivilegeEscalation: true
            runAsNonRoot: true
            runAsUser: 65534
            runAsGroup: 65534
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
              # turnserver's binary carries an effective file-cap (cap_net_bind_service);
              # with an empty bounding set the kernel refuses to exec it (EPERM), so add it back.
              add: ["NET_BIND_SERVICE"]
      volumes:
        - name: tmp
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: coturn
  labels: {app: coturn}
spec:
  selector: {app: coturn}
  ports:
    - name: turn-udp
      port: 3478
      targetPort: turn-udp
      protocol: UDP
