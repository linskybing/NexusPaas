apiVersion: apps/v1
kind: Deployment
metadata:
  name: coturn
  labels: {app: coturn}
spec:
  replicas: 1
  selector: {matchLabels: {app: coturn}}
  template:
    metadata:
      labels: {app: coturn}
    spec:
      hostNetwork: true
      dnsPolicy: ClusterFirstWithHostNet
      automountServiceAccountToken: false
      securityContext:
        fsGroup: 65534
        seccompProfile: {type: RuntimeDefault}
      initContainers:
        - name: prepare-turnserver
          image: coturn/coturn:4.6.3
          imagePullPolicy: IfNotPresent
          command: ["/bin/sh", "-ec"]
          args:
            - cp /usr/bin/turnserver /work/turnserver && chmod 0555 /work/turnserver
          volumeMounts:
            - {name: turnserver-bin, mountPath: /work}
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            runAsUser: 65534
            runAsGroup: 65534
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
      containers:
        - name: coturn
          image: coturn/coturn:4.6.3
          imagePullPolicy: IfNotPresent
          command: ["/bin/sh", "-ec"]
          args:
            - >
              exec /work/turnserver
              --listening-ip=0.0.0.0
              --listening-port=3478
              --min-port=49152
              --max-port=49252
              --use-auth-secret
              --static-auth-secret="$TURN_STATIC_AUTH_SECRET"
              --realm="${TURN_REALM:-nexuspaas.local}"
              --fingerprint
              --no-cli
              --no-multicast-peers
              --no-software-attribute
              --userdb=/tmp/turnserver-turndb
              --pidfile=/tmp/turnserver.pid
              --log-file=stdout
              --prometheus
          env:
            - name: TURN_STATIC_AUTH_SECRET
              valueFrom:
                secretKeyRef:
                  name: coturn-runtime-secret
                  key: TURN_STATIC_AUTH_SECRET
            - name: TURN_REALM
              valueFrom:
                secretKeyRef:
                  name: coturn-runtime-secret
                  key: TURN_REALM
                  optional: true
          ports:
            - {name: turn-udp, containerPort: 3478, protocol: UDP}
            - {name: metrics, containerPort: 9641, protocol: TCP}
          resources:
            requests: {cpu: 100m, memory: 128Mi, ephemeral-storage: 128Mi}
            limits: {cpu: 500m, memory: 512Mi, ephemeral-storage: 512Mi}
          volumeMounts:
            - {name: turnserver-bin, mountPath: /work, readOnly: true}
            - {name: tmp, mountPath: /tmp}
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            runAsUser: 65534
            runAsGroup: 65534
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
      volumes:
        - name: turnserver-bin
          emptyDir: {}
        - name: tmp
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: coturn
  labels: {app: coturn}
spec:
  selector: {app: coturn}
  ports:
    - name: turn-udp
      port: 3478
      targetPort: turn-udp
      protocol: UDP
