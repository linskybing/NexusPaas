# Dex OIDC provider (findings 6, 30). In-cluster issuer so token `iss` and the
# JWKS URL the services verify against both resolve to the dex Service.
apiVersion: v1
kind: ConfigMap
metadata:
  name: dex-config
data:
  config.yaml: |
    issuer: http://dex:5556/dex
    # Postgres-backed storage so issued tokens, auth codes, refresh tokens, and
    # device-flow state survive restarts and are shared across replicas (findings
    # 6, 30). Dex creates its own tables in the shared nexuspaas database.
    storage:
      type: postgres
      config:
        host: postgres
        port: 5432
        database: nexuspaas
        user: nexuspaas
        password: $POSTGRES_PASSWORD
        ssl:
          mode: disable
    web:
      http: 0.0.0.0:5556
    oauth2:
      passwordConnector: local
      skipApprovalScreen: true
    enablePasswordDB: true
    staticClients:
      - id: platform
        name: NexusPaas
        public: true
        redirectURIs:
          - http://localhost:8080/api/v1/oidc/callback
    staticPasswords:
      - email: admin@example.com
        # hashFromEnv avoids dex config env-expansion mangling the $ chars in the bcrypt hash
        hashFromEnv: DEX_STATIC_PASSWORD_HASH
        username: admin
        userID: "08a8684b-db88-4b73-90a9-3cd1661f5466"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: dex
  labels: {app: dex}
spec:
  replicas: 1
  selector: {matchLabels: {app: dex}}
  template:
    metadata:
      labels: {app: dex}
    spec:
      automountServiceAccountToken: false
      containers:
        - name: dex
          image: ghcr.io/dexidp/dex:v2.41.1
          args: ["dex", "serve", "/etc/dex/config.yaml"]
          env:
            - name: DEX_STATIC_PASSWORD_HASH
              valueFrom:
                secretKeyRef: {name: dex-dev-password, key: bcrypt-hash}
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef: {name: postgres-dev-password, key: password}
          ports: [{containerPort: 5556}]
          readinessProbe:
            httpGet: {path: /dex/.well-known/openid-configuration, port: 5556}
            initialDelaySeconds: 3
            periodSeconds: 5
          resources:
            requests: {cpu: 50m, memory: 64Mi, ephemeral-storage: 128Mi}
            limits: {cpu: 250m, memory: 256Mi, ephemeral-storage: 512Mi}
          volumeMounts:
            - {name: config, mountPath: /etc/dex}
      volumes:
        - name: config
          configMap: {name: dex-config}
---
apiVersion: v1
kind: Service
metadata:
  name: dex
spec:
  selector: {app: dex}
  ports: [{port: 5556, targetPort: 5556}]
