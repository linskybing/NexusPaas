apiVersion: v1
kind: ConfigMap
metadata:
  name: authorization-policy-service-config
  labels: {app: authorization-policy-service}
data:
  SERVICE_NAME: "authorization-policy-service"
  HTTP_ADDR: ":8080"
  REQUIRE_AUTH: "true"
  PRODUCTION: "true"
  APP_ENV: "production"
  LOG_LEVEL: "info"
  OTEL_EXPORTER_OTLP_ENDPOINT: ""
  OTEL_SERVICE_NAME: "authorization-policy-service"
  OTEL_TRACES_SAMPLER: "parentbased_traceratio"
  OTEL_TRACES_SAMPLER_ARG: "0.1"
  OTEL_RESOURCE_ATTRIBUTES: "service.namespace=nexuspaas,deployment.environment=production"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: authorization-policy-service
  labels: {app: authorization-policy-service}
spec:
  replicas: 1
  selector: {matchLabels: {app: authorization-policy-service}}
  template:
    metadata:
      labels: {app: authorization-policy-service}
    spec:
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        runAsGroup: 10001
        fsGroup: 10001
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: app
          image: nexuspaas-backend:v0.1.0
          imagePullPolicy: IfNotPresent
          envFrom:
            - configMapRef:
                name: authorization-policy-service-config
            # Required keys in authorization-policy-service-runtime-secret:
            # API_KEYS + API_KEY_PRINCIPALS or JWT_JWKS_URL + JWT_ISSUER + JWT_AUDIENCE, DATABASE_URL, REDIS_URL, EVENT_BUS_URL; authorization-policy-service uses its local RawPolicyPDP.
            - secretRef:
                name: authorization-policy-service-runtime-secret
          ports: [{containerPort: 8080}]
          livenessProbe: {httpGet: {path: /healthz, port: 8080}}
          readinessProbe: {httpGet: {path: /readyz, port: 8080}}
          startupProbe: {httpGet: {path: /healthz, port: 8080}, failureThreshold: 30, periodSeconds: 2}
          resources:
            requests: {cpu: 100m, memory: 128Mi, ephemeral-storage: 256Mi}
            limits: {cpu: 500m, memory: 512Mi, ephemeral-storage: 1Gi}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
---
apiVersion: v1
kind: Service
metadata:
  name: authorization-policy-service
spec:
  selector: {app: authorization-policy-service}
  ports: [{port: 80, targetPort: 8080}]
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: authorization-policy-service
spec:
  minAvailable: 1
  selector: {matchLabels: {app: authorization-policy-service}}
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: authorization-policy-service
spec:
  scaleTargetRef: {apiVersion: apps/v1, kind: Deployment, name: authorization-policy-service}
  minReplicas: 1
  maxReplicas: 4
  metrics:
    - type: Resource
      resource: {name: cpu, target: {type: Utilization, averageUtilization: 70}}
