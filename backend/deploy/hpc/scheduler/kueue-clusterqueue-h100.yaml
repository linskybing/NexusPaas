apiVersion: kueue.x-k8s.io/v1beta1
kind: ResourceFlavor
metadata:
  name: h100-sxm
spec:
  nodeLabels:
    nexuspaas.io/gpu-class: h100-sxm
---
apiVersion: kueue.x-k8s.io/v1beta1
kind: ClusterQueue
metadata:
  name: h100-cluster-queue
spec:
  namespaceSelector: {}
  resourceGroups:
    - coveredResources:
        - cpu
        - memory
        - nvidia.com/gpu
      flavors:
        - name: h100-sxm
          resources:
            - name: cpu
              nominalQuota: "4096"
            - name: memory
              nominalQuota: 32Ti
            - name: nvidia.com/gpu
              nominalQuota: "64"
