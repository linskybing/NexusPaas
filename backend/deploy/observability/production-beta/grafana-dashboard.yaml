apiVersion: v1
kind: ConfigMap
metadata:
  name: nexuspaas-production-beta-dashboard
  labels:
    app.kubernetes.io/name: nexuspaas
    app.kubernetes.io/component: observability
    grafana_dashboard: "1"
data:
  nexuspaas-production-beta.json: |
    {
      "uid": "nexuspaas-production-beta",
      "title": "NexusPaas Production Beta",
      "schemaVersion": 39,
      "version": 1,
      "refresh": "30s",
      "tags": ["nexuspaas", "production-beta", "microservices"],
      "templating": {
        "list": [
          {
            "name": "service",
            "type": "custom",
            "label": "Service",
            "query": "platform-gateway,iam-unit,tenant-unit,collaboration-unit,platform-io-unit,usage-observability,compute-api,compute-control-plane",
            "current": {"text": "platform-gateway", "value": "platform-gateway"}
          }
        ]
      },
      "panels": [
        {
          "id": 1,
          "type": "stat",
          "title": "Core API availability",
          "description": "Beta target >= 99.5% successful requests for core journeys.",
          "targets": [
            {
              "expr": "100 * sum(rate(nexuspaas_http_requests_total{service=~\"platform-gateway|iam-unit|tenant-unit|compute-api|compute-control-plane\",status!~\"5..\"}[5m])) / clamp_min(sum(rate(nexuspaas_http_requests_total{service=~\"platform-gateway|iam-unit|tenant-unit|compute-api|compute-control-plane\"}[5m])), 1)"
            }
          ]
        },
        {
          "id": 2,
          "type": "timeseries",
          "title": "Request rate by service",
          "targets": [
            {
              "expr": "sum by (service, status) (rate(nexuspaas_http_requests_total{service=~\"$service\"}[5m]))"
            }
          ]
        },
        {
          "id": 3,
          "type": "timeseries",
          "title": "5xx rate by service",
          "targets": [
            {
              "expr": "sum by (service) (rate(nexuspaas_http_requests_total{service=~\"$service\",status=~\"5..\"}[5m]))"
            }
          ]
        },
        {
          "id": 4,
          "type": "timeseries",
          "title": "p95 request latency",
          "description": "Uses HTTP duration histogram buckets for Production Beta p95 latency SLOs.",
          "targets": [
            {
              "expr": "histogram_quantile(0.95, sum by (service, le) (rate(nexuspaas_http_request_duration_seconds_bucket{service=~\"$service\"}[5m])))"
            }
          ]
        },
        {
          "id": 5,
          "type": "stat",
          "title": "Deployment availability",
          "targets": [
            {
              "expr": "kube_deployment_status_replicas_available{namespace=\"nexuspaas\",deployment=~\"platform-gateway|iam-unit|tenant-unit|collaboration-unit|platform-io-unit|usage-observability|compute-api|compute-control-plane\"}"
            }
          ]
        },
        {
          "id": 6,
          "type": "stat",
          "title": "Synthetic smoke failures",
          "targets": [
            {
              "expr": "sum(kube_job_status_failed{namespace=\"nexuspaas\",job_name=~\"nexuspaas-synthetic-smoke-.*\"})"
            }
          ]
        }
      ]
    }
