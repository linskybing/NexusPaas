# Self-contained plain-Prometheus deployment for live scrape/retention/alert
# evidence (kind and other operator-less clusters). The PodMonitor +
# PrometheusRule objects in this directory remain the prometheus-operator path;
# this manifest embeds the SAME alert groups (parity is enforced by
# TestPrometheusAlertRulesParity) and scrapes the same 8 units.
#
# Apply directly (the kustomization keeps the operator objects only):
#   kubectl -n nexuspaas create secret generic nexuspaas-prometheus-scrape-secret \
#     --from-literal=api-key=<admin API key or identity API token>
#   kubectl -n nexuspaas apply -f backend/deploy/observability/production-beta/prometheus.yaml
#
# Storage is an emptyDir with 7d retention configured — suitable for the
# production-beta evidence tier; external durable storage is an overlay concern.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: prometheus
  namespace: nexuspaas
  labels: {app: prometheus}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: prometheus-pod-discovery
  labels: {app: prometheus}
rules:
  - apiGroups: [""]
    resources: [pods]
    verbs: [get, list, watch]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: prometheus-pod-discovery
  labels: {app: prometheus}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: prometheus-pod-discovery
subjects:
  - kind: ServiceAccount
    name: prometheus
    namespace: nexuspaas
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  labels: {app: prometheus}
data:
  prometheus.yml: |
    global:
      scrape_interval: 30s
      evaluation_interval: 30s
    rule_files:
      - /etc/prometheus/rules/*.yaml
    scrape_configs:
      - job_name: nexuspaas-units
        kubernetes_sd_configs:
          - role: pod
            namespaces:
              own_namespace: true
        http_headers:
          X-API-Key:
            files:
              - /etc/prometheus/scrape-secret/api-key
        relabel_configs:
          - source_labels: [__meta_kubernetes_pod_label_app]
            regex: platform-gateway|iam-unit|tenant-unit|collaboration-unit|platform-io-unit|usage-observability|compute-api|compute-control-plane
            action: keep
          - source_labels: [__meta_kubernetes_pod_ip]
            target_label: __address__
            replacement: $1:8080
          # `up` only carries target labels; the alert rules select on
          # namespace, so it must be relabeled in or the availability alerts
          # match nothing on this operator-less path.
          - source_labels: [__meta_kubernetes_namespace]
            target_label: namespace
          - source_labels: [__meta_kubernetes_pod_label_app]
            target_label: service
          - source_labels: [__meta_kubernetes_pod_name]
            target_label: pod
      - job_name: kube-state-metrics
        static_configs:
          - targets: ["kube-state-metrics:8080"]
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-alert-rules
  labels: {app: prometheus}
data:
  # Same groups as the PrometheusRule object in prometheus-rules.yaml —
  # TestPrometheusAlertRulesParity fails the build if these drift apart.
  nexuspaas-alerts.yaml: |
    groups:
      - name: nexuspaas.production-beta.availability
        rules:
          - alert: NexusPaasServiceUnscraped
            expr: max by (service) (up{namespace="nexuspaas",service=~"platform-gateway|iam-unit|tenant-unit|collaboration-unit|platform-io-unit|usage-observability|compute-api|compute-control-plane"}) < 1
            for: 5m
            labels:
              severity: page
            annotations:
              summary: NexusPaas service metrics are not being scraped
              runbook_url: backend/docs/operational-readiness.md
          - alert: NexusPaasDeploymentUnavailable
            expr: kube_deployment_status_replicas_available{namespace="nexuspaas",deployment=~"platform-gateway|iam-unit|tenant-unit|collaboration-unit|platform-io-unit|usage-observability|compute-api|compute-control-plane"} < 1
            for: 5m
            labels:
              severity: page
            annotations:
              summary: NexusPaas deployment has no available replicas
              runbook_url: backend/docs/operational-readiness.md
          - alert: NexusPaasCoreAvailabilityBurn
            expr: (100 * sum(rate(nexuspaas_http_requests_total{service=~"platform-gateway|iam-unit|tenant-unit|compute-api|compute-control-plane",status!~"5.."}[5m])) / clamp_min(sum(rate(nexuspaas_http_requests_total{service=~"platform-gateway|iam-unit|tenant-unit|compute-api|compute-control-plane"}[5m])), 1) < 99.5) and sum(rate(nexuspaas_http_requests_total{service=~"platform-gateway|iam-unit|tenant-unit|compute-api|compute-control-plane"}[5m])) > 0
            for: 10m
            labels:
              severity: page
            annotations:
              summary: NexusPaas core API availability is below the Beta target
              runbook_url: backend/docs/operational-readiness.md
      - name: nexuspaas.production-beta.latency
        rules:
          - alert: NexusPaasHighReadP95Latency
            expr: histogram_quantile(0.95, sum by (service, le) (rate(nexuspaas_http_request_duration_seconds_bucket{service=~"platform-gateway|iam-unit|tenant-unit|collaboration-unit|platform-io-unit|usage-observability|compute-api|compute-control-plane",method="GET"}[5m]))) > 0.5
            for: 10m
            labels:
              severity: ticket
            annotations:
              summary: NexusPaas p95 read latency is above the Beta read target
              runbook_url: backend/docs/operational-readiness.md
          - alert: NexusPaasHighWriteP95Latency
            expr: histogram_quantile(0.95, sum by (service, le) (rate(nexuspaas_http_request_duration_seconds_bucket{service=~"platform-gateway|iam-unit|tenant-unit|collaboration-unit|platform-io-unit|usage-observability|compute-api|compute-control-plane",method=~"POST|PUT|PATCH|DELETE"}[5m]))) > 1
            for: 10m
            labels:
              severity: ticket
            annotations:
              summary: NexusPaas p95 write latency is above the Beta write target
              runbook_url: backend/docs/operational-readiness.md
      - name: nexuspaas.production-beta.errors
        rules:
          - alert: NexusPaasService5xx
            expr: sum by (service) (rate(nexuspaas_http_requests_total{service=~"platform-gateway|iam-unit|tenant-unit|collaboration-unit|platform-io-unit|usage-observability|compute-api|compute-control-plane",status=~"5.."}[5m])) > 0
            for: 5m
            labels:
              severity: page
            annotations:
              summary: NexusPaas service is returning 5xx responses
              runbook_url: backend/docs/operational-readiness.md
          - alert: NexusPaasSyntheticSmokeFailed
            expr: sum(kube_job_status_failed{namespace="nexuspaas",job_name=~"nexuspaas-synthetic-smoke-.*"}) > 0
            for: 5m
            labels:
              severity: page
            annotations:
              summary: NexusPaas scheduled synthetic smoke failed
              runbook_url: backend/docs/operational-readiness.md
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: prometheus
  labels: {app: prometheus}
spec:
  replicas: 1
  selector:
    matchLabels: {app: prometheus}
  template:
    metadata:
      labels: {app: prometheus}
    spec:
      serviceAccountName: prometheus
      securityContext:
        runAsNonRoot: true
        runAsUser: 65534
        fsGroup: 65534
      containers:
        - name: prometheus
          image: prom/prometheus:v3.4.1
          args:
            - --config.file=/etc/prometheus/prometheus.yml
            - --storage.tsdb.path=/prometheus
            - --storage.tsdb.retention.time=7d
            - --web.listen-address=:9090
          ports:
            - containerPort: 9090
          readinessProbe:
            httpGet: {path: /-/ready, port: 9090}
            initialDelaySeconds: 5
            periodSeconds: 5
          volumeMounts:
            - {name: config, mountPath: /etc/prometheus}
            - {name: rules, mountPath: /etc/prometheus/rules}
            - {name: scrape-secret, mountPath: /etc/prometheus/scrape-secret, readOnly: true}
            - {name: data, mountPath: /prometheus}
          resources:
            requests: {cpu: 100m, memory: 256Mi, ephemeral-storage: 2Gi}
            limits: {cpu: "1", memory: 1Gi, ephemeral-storage: 8Gi}
      volumes:
        - name: config
          configMap: {name: prometheus-config}
        - name: rules
          configMap: {name: prometheus-alert-rules}
        - name: scrape-secret
          secret: {secretName: nexuspaas-prometheus-scrape-secret}
        - name: data
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: prometheus
  labels: {app: prometheus}
spec:
  selector: {app: prometheus}
  ports:
    - {name: http, port: 9090, targetPort: 9090}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: kube-state-metrics
  namespace: nexuspaas
  labels: {app: kube-state-metrics}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: nexuspaas-kube-state-metrics
  labels: {app: kube-state-metrics}
rules:
  - apiGroups: [apps]
    resources: [deployments]
    verbs: [list, watch]
  - apiGroups: [batch]
    resources: [jobs]
    verbs: [list, watch]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: nexuspaas-kube-state-metrics
  labels: {app: kube-state-metrics}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: nexuspaas-kube-state-metrics
subjects:
  - kind: ServiceAccount
    name: kube-state-metrics
    namespace: nexuspaas
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: kube-state-metrics
  labels: {app: kube-state-metrics}
spec:
  replicas: 1
  selector:
    matchLabels: {app: kube-state-metrics}
  template:
    metadata:
      labels: {app: kube-state-metrics}
    spec:
      serviceAccountName: kube-state-metrics
      securityContext:
        runAsNonRoot: true
        runAsUser: 65534
      containers:
        - name: kube-state-metrics
          image: registry.k8s.io/kube-state-metrics/kube-state-metrics:v2.13.0
          args:
            # only the collectors our alert rules read
            - --resources=deployments,jobs
            - --namespaces=nexuspaas
          ports:
            - containerPort: 8080
          readinessProbe:
            httpGet: {path: /healthz, port: 8080}
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests: {cpu: 20m, memory: 64Mi, ephemeral-storage: 128Mi}
            limits: {cpu: 200m, memory: 256Mi, ephemeral-storage: 512Mi}
---
apiVersion: v1
kind: Service
metadata:
  name: kube-state-metrics
  labels: {app: kube-state-metrics}
spec:
  selector: {app: kube-state-metrics}
  ports:
    - {name: http, port: 8080, targetPort: 8080}
