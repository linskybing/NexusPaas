# OpenTelemetry Collector — the OTLP endpoint every microservice exports traces to.
#
# Each service ships with OTEL_EXPORTER_OTLP_ENDPOINT pointing at the in-cluster
# Service defined below (http://otel-collector.observability.svc.cluster.local:4318).
# The collector receives OTLP over HTTP/gRPC, batches, and forwards to a tracing
# backend. Replace the `debug` exporter with your real backend (Jaeger, Tempo,
# an OTLP-compatible SaaS, etc.) by editing the `exporters` and `pipelines` blocks.
apiVersion: v1
kind: Namespace
metadata:
  name: observability
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: otel-collector-config
  namespace: observability
  labels: {app: otel-collector}
data:
  collector.yaml: |
    receivers:
      otlp:
        protocols:
          grpc:
            endpoint: 0.0.0.0:4317
          http:
            endpoint: 0.0.0.0:4318
    processors:
      batch: {}
      memory_limiter:
        check_interval: 1s
        limit_percentage: 80
        spike_limit_percentage: 25
    exporters:
      # Swap this for your tracing backend, e.g.:
      # otlp/tempo:
      #   endpoint: tempo.observability.svc.cluster.local:4317
      #   tls: {insecure: true}
      debug:
        verbosity: normal
    service:
      pipelines:
        traces:
          receivers: [otlp]
          processors: [memory_limiter, batch]
          exporters: [debug]
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: otel-collector
  namespace: observability
  labels: {app: otel-collector}
spec:
  replicas: 1
  selector: {matchLabels: {app: otel-collector}}
  template:
    metadata:
      labels: {app: otel-collector}
    spec:
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        runAsGroup: 10001
        fsGroup: 10001
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: otel-collector
          image: otel/opentelemetry-collector-contrib:0.110.0
          imagePullPolicy: IfNotPresent
          args: ["--config=/etc/otel/collector.yaml"]
          ports:
            - {containerPort: 4317, name: otlp-grpc}
            - {containerPort: 4318, name: otlp-http}
          volumeMounts:
            - {name: config, mountPath: /etc/otel}
          resources:
            requests: {cpu: 100m, memory: 128Mi, ephemeral-storage: 256Mi}
            limits: {cpu: 500m, memory: 512Mi, ephemeral-storage: 1Gi}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
      volumes:
        - name: config
          configMap:
            name: otel-collector-config
---
apiVersion: v1
kind: Service
metadata:
  name: otel-collector
  namespace: observability
  labels: {app: otel-collector}
spec:
  selector: {app: otel-collector}
  ports:
    - {name: otlp-grpc, port: 4317, targetPort: 4317}
    - {name: otlp-http, port: 4318, targetPort: 4318}
