# SonarQube Cloud automatic-analysis configuration.
#
# Automatic Analysis does not read sonar-project.properties (that file is used by
# the CI-based scanner / local Quality Gate). Mirror the copy-paste-detection
# exclusions here so the new-code Duplication condition focuses on executable
# product code.
#
# Excluded from duplication detection only (still analyzed for bugs, code smells,
# and security): intentionally repetitive non-product code —
#   - Kubernetes deployment manifests (probes/resources/selectors repeat per unit)
#   - Go table-driven tests and typed contract/API JSON fixtures (parity tests and
#     fixtures duplicate the same shape per route/event by design)
#   - SQL migrations (per-table ALTER/backfill INSERT...ON CONFLICT boilerplate
#     that SQL cannot deduplicate without obscuring a reviewable migration)
sonar.cpd.exclusions=backend/deploy/k3s/**/*.yaml,backend/kustomization.yaml,backend/deploy/reference/per-service/**/*.yaml,backend/migrations/**/*.sql,backend/**/*_test.go,backend/internal/contracts/fixtures/**/*.json
