# SonarQube Cloud automatic-analysis configuration.
#
# Automatic Analysis does not read sonar-project.properties (that file drives the
# CI-based scanner / local Quality Gate). This file keeps the REMOTE automatic
# scan ALIGNED with the local scan by declaring the same analysis scope. Per the
# SonarQube Cloud docs, .sonarcloud.properties takes precedence over the UI
# (Administration > General Settings > Analysis Scope), so these values widen the
# automatic scan to the whole repository regardless of any UI source restriction.
#
# Scope: analyze the whole first-party repo (backend/, docs/, .github/, root, ...).
# Exclude only the vendored upstream reference backend (references/**, untracked)
# and generated/gitignored artifacts (never in the Git tree; listed so this stays
# identical to sonar-project.properties' exclusions).
sonar.sources=.
sonar.tests=.
sonar.test.inclusions=**/*_test.go
sonar.sourceEncoding=UTF-8
sonar.exclusions=references/**,backend/.cache/**,.codegraph/**,.scannerwork/**,**/node_modules/**,**/coverage.out

# Copy-paste detection exclusions — intentionally repetitive non-product code
# (still analyzed for bugs, code smells, and security):
#   - Kubernetes deployment manifests (probes/resources/selectors repeat per unit)
#   - Go table-driven tests and typed contract/API JSON fixtures (parity tests and
#     fixtures duplicate the same shape per route/event by design)
#   - SQL migrations (per-table ALTER/backfill INSERT...ON CONFLICT boilerplate
#     that SQL cannot deduplicate without obscuring a reviewable migration)
sonar.cpd.exclusions=backend/deploy/k3s/**/*.yaml,backend/kustomization.yaml,backend/deploy/reference/per-service/**/*.yaml,backend/migrations/**/*.sql,backend/**/*_test.go,backend/internal/contracts/fixtures/**/*.json

# S5332 (clear-text protocol) suppressed only for the production-beta backend
# units manifest: every flagged value is the in-cluster OTLP endpoint
# (http://otel-collector.observability.svc.cluster.local:4318). The collector
# serves plaintext OTLP on 4318 (no TLS listener) and all intra-cluster traffic
# already uses http:// by design; app-level TLS would claim a transport that does
# not exist. Scoped to this one manifest + rule (kept aligned with
# sonar-project.properties).
sonar.issue.ignore.multicriteria=otlpInCluster
sonar.issue.ignore.multicriteria.otlpInCluster.ruleKey=kubernetes:S5332
sonar.issue.ignore.multicriteria.otlpInCluster.resourceKey=backend/deploy/k3s/production-beta/backend-units.yaml
