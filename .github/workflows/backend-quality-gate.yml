name: Backend Quality Gate

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      full_gate:
        description: Run all backend gates regardless of changed paths
        required: false
        type: boolean
        default: true

permissions:
  contents: read

concurrency:
  group: backend-quality-gate-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  GO_VERSION: "1.25.11"
  GOVULNCHECK_VERSION: "v1.3.0"
  COVERAGE_THRESHOLD: "80.0"
  BACKEND_IMAGE: nexuspaas-backend:ci-${{ github.sha }}
  TEST_REDIS_URL: redis://127.0.0.1:16379/0
  TEST_EVENT_BUS_URL: redis://127.0.0.1:16379/0
  TEST_OBJECT_STORE_ACCESS_KEY: nexuspaas
  TEST_OBJECT_STORE_SECRET_KEY: nexuspaas-local-only
  TEST_OBJECT_STORE_BUCKET: media-e2e
  TEST_OBJECT_STORE_URL: http://127.0.0.1:19000
  TEST_DATABASE_URL: postgres://nexuspaas@127.0.0.1:15432/nexuspaas?sslmode=disable
  E2E_API_KEY: smoke-api-key
  E2E_SERVICE_API_KEY: smoke-service-key
  TRIVY_TIMEOUT: "10m"
  HARBOR_VERSION: "v2.15.1"
  HARBOR_HTTP_PORT: "18080"
  HARBOR_ADMIN_PASSWORD: "Harbor12345-ci"
  HARBOR_SEED_PROJECT: "nexuspaas-e2e"
  HARBOR_SEED_REPOSITORY: "smoke"
  HARBOR_SEED_TAG: "v1"

jobs:
  detect-changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    outputs:
      workflow_lint: ${{ steps.filter.outputs.workflow == 'true' || (github.event_name == 'workflow_dispatch' && inputs.full_gate) }}
      quick: ${{ steps.filter.outputs.backend_go == 'true' || steps.filter.outputs.backend_deps == 'true' || (github.event_name == 'workflow_dispatch' && inputs.full_gate) }}
      integration: ${{ steps.filter.outputs.backend_go == 'true' || steps.filter.outputs.backend_deps == 'true' || steps.filter.outputs.backend_migrations == 'true' || steps.filter.outputs.backend_docker == 'true' || steps.filter.outputs.backend_deploy == 'true' || steps.filter.outputs.backend_compose == 'true' || steps.filter.outputs.backend_scripts == 'true' || (github.event_name == 'workflow_dispatch' && inputs.full_gate) }}
      govulncheck: ${{ steps.filter.outputs.backend_go == 'true' || steps.filter.outputs.backend_deps == 'true' || (github.event_name == 'workflow_dispatch' && inputs.full_gate) }}
      osv: ${{ steps.filter.outputs.backend_deps == 'true' || (github.event_name == 'workflow_dispatch' && inputs.full_gate) }}
      trivy_fs: ${{ steps.filter.outputs.workflow == 'true' || steps.filter.outputs.backend_deps == 'true' || steps.filter.outputs.backend_docker == 'true' || steps.filter.outputs.backend_deploy == 'true' || steps.filter.outputs.backend_scripts == 'true' || (github.event_name == 'workflow_dispatch' && inputs.full_gate) }}
      image_scan: ${{ steps.filter.outputs.backend_deps == 'true' || steps.filter.outputs.backend_migrations == 'true' || steps.filter.outputs.backend_docker == 'true' || steps.filter.outputs.backend_deploy == 'true' || (github.event_name == 'workflow_dispatch' && inputs.full_gate) }}

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - name: Classify changed paths
        id: filter
        uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4
        with:
          filters: |
            workflow:
              - '.github/**'
            backend_go:
              - 'backend/**/*.go'
            backend_deps:
              - 'backend/go.mod'
              - 'backend/go.sum'
            backend_migrations:
              - 'backend/migrations/**'
            backend_docker:
              - 'backend/Dockerfile'
              - '.dockerignore'
            backend_deploy:
              - 'backend/deploy/**'
              - 'backend/kustomization.yaml'
            backend_compose:
              - 'backend/deploy/local/**'
              - 'backend/docker-compose*.yml'
            backend_scripts:
              - 'backend/scripts/**'

  workflow-lint:
    name: Workflow Lint
    needs: detect-changes
    if: needs.detect-changes.outputs.workflow_lint == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
      checks: write
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Run actionlint
        uses: reviewdog/action-actionlint@e0207a28405ecad11953ba625a95d92f7889572a # v1
        with:
          reporter: github-pr-check
          fail_level: error

  quick:
    name: Quick Go Checks
    needs: detect-changes
    if: needs.detect-changes.outputs.quick == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: backend/go.sum

      - name: Check gofmt
        run: |
          unformatted="$(find . -name '*.go' -type f -print0 | xargs -0 gofmt -l)"
          if [ -n "${unformatted}" ]; then
            printf '%s\n' "${unformatted}"
            exit 1
          fi

      - name: Go vet
        run: go vet ./...

      - name: Unit tests
        run: go test ./... -count=1

      - name: Build
        run: go build ./...

  integration-e2e:
    name: Integration and E2E
    needs: detect-changes
    if: needs.detect-changes.outputs.integration == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 75
    permissions:
      contents: read
    defaults:
      run:
        working-directory: backend
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: nexuspaas
          POSTGRES_DB: nexuspaas
          POSTGRES_HOST_AUTH_METHOD: trust
        ports:
          - 15432:5432
        options: >-
          --health-cmd "pg_isready -U nexuspaas -d nexuspaas"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 12
      redis:
        image: redis:7-alpine
        ports:
          - 16379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 12
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: backend/go.sum

      - name: Start MinIO
        run: |
          minio_api_port="${TEST_OBJECT_STORE_API_PORT:-19000}"
          minio_console_port="${TEST_OBJECT_STORE_CONSOLE_PORT:-19001}"
          docker rm -f nexuspaas-minio-ci >/dev/null 2>&1 || true
          docker run --rm -d \
            --name nexuspaas-minio-ci \
            -e MINIO_ROOT_USER="${TEST_OBJECT_STORE_ACCESS_KEY}" \
            -e MINIO_ROOT_PASSWORD="${TEST_OBJECT_STORE_SECRET_KEY}" \
            -p "${minio_api_port}:9000" \
            -p "${minio_console_port}:9001" \
            minio/minio:RELEASE.2025-04-08T15-41-24Z \
            server /data --console-address :9001

      - name: Wait for MinIO
        run: |
          for attempt in $(seq 1 60); do
            if curl -fsS "${TEST_OBJECT_STORE_URL}/minio/health/live" >/dev/null; then
              exit 0
            fi
            if [ "${attempt}" -eq 60 ]; then
              exit 1
            fi
            sleep 2
          done

      - name: Cache Harbor installer
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          # Cache only the immutable release tarball, never the extracted
          # harbor/ directory or its data_volume: those hold per-run runtime
          # state (Postgres data, generated secrets/certs) and must stay
          # ephemeral, not leak across CI runs.
          path: backend/.cache/harbor-${{ env.HARBOR_VERSION }}/harbor-online-installer-${{ env.HARBOR_VERSION }}.tgz
          key: harbor-installer-${{ env.HARBOR_VERSION }}

      - name: Start Harbor
        run: scripts/harbor-up.sh

      - name: Seed Harbor
        run: scripts/harbor-seed.sh

      - name: Integration coverage
        run: |
          go test -tags integration ./... -coverprofile=coverage.out -count=1
          total="$(go tool cover -func=coverage.out | awk '/^total:/ {gsub("%", "", $3); print $3}')"
          if [ -z "${total}" ]; then
            echo "could not read total coverage"
            exit 1
          fi
          awk -v got="${total}" -v want="${COVERAGE_THRESHOLD}" 'BEGIN { exit (got + 0 >= want + 0) ? 0 : 1 }'

      - name: Focused E2E
        env:
          FOCUSED_E2E_PATTERN: TestServiceRouteIsolationContract|TestServiceIsolationValidationE2E|TestIsolatedRuntimeRegistrationE2E|TestProviderConsumerContractMatrix|TestCriticalCrossServiceJourneys|TestSchedulerAdmissionOwnerReadContractsE2E|TestNonBlobIsolatedServiceIgnoresObjectStoreConfigE2E|TestStorageMountPlanContractE2E
          FOCUSED_E2E_PASS_PATTERN: '^--- PASS: Test(ServiceRouteIsolationContract|ServiceIsolationValidationE2E|IsolatedRuntimeRegistrationE2E|ProviderConsumerContractMatrix|CriticalCrossServiceJourneys|SchedulerAdmissionOwnerReadContractsE2E|NonBlobIsolatedServiceIgnoresObjectStoreConfigE2E|StorageMountPlanContractE2E)'
          FOCUSED_E2E_SKIP_PATTERN: '^[[:space:]]*--- SKIP:|^SKIP[[:space:]]'
        run: |
          set -o pipefail
          go test -tags e2e ./internal/e2e -run "${FOCUSED_E2E_PATTERN}" -count=1 -v 2>&1 | tee focused-e2e.log
          grep -E "${FOCUSED_E2E_PASS_PATTERN}" focused-e2e.log >/dev/null
          if grep -Eq "${FOCUSED_E2E_SKIP_PATTERN}" focused-e2e.log; then
            exit 1
          fi

      - name: Full non-live E2E
        run: |
          set -o pipefail
          go test -tags e2e ./internal/e2e -count=1 -v 2>&1 | tee full-e2e.log

      - name: Live Harbor E2E
        env:
          TEST_LIVE_HARBOR_IMAGE_BUILD: "1"
          HARBOR_URL: http://127.0.0.1:${{ env.HARBOR_HTTP_PORT }}
        run: |
          set -o pipefail
          go test -tags e2e ./internal/e2e -run 'TestLiveHarborImageBuildE2E|TestLiveHarborCatalogSyncE2E' -count=1 -v 2>&1 | tee harbor-e2e.log

      - name: Stop Harbor
        if: always()
        run: scripts/harbor-down.sh || true

      - name: Upload test artifacts
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: backend-test-artifacts
          path: |
            backend/coverage.out
            backend/focused-e2e.log
            backend/full-e2e.log
            backend/harbor-e2e.log
          if-no-files-found: ignore

  govulncheck:
    name: Go Vulnerability Scan
    needs: detect-changes
    if: needs.detect-changes.outputs.govulncheck == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: backend/go.sum

      - name: Run govulncheck
        working-directory: backend
        run: |
          for attempt in 1 2 3; do
            if go install "golang.org/x/vuln/cmd/govulncheck@${GOVULNCHECK_VERSION}"; then
              break
            fi
            if [ "${attempt}" -eq 3 ]; then
              exit 1
            fi
            sleep $((attempt * 10))
          done
          "$(go env GOPATH)/bin/govulncheck" ./...

  osv-scan:
    name: OSV Dependency Scan
    needs: detect-changes
    if: needs.detect-changes.outputs.osv == 'true'
    uses: google/osv-scanner-action/.github/workflows/osv-scanner-reusable.yml@9a498708959aeaef5ef730655706c5a1df1edbc2 # v2.3.8
    with:
      scan-args: |-
        --recursive
        ./backend
      upload-sarif: ${{ github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository }}
      fail-on-vuln: true
    permissions:
      actions: read
      contents: read
      security-events: write

  trivy-fs:
    name: Trivy Filesystem Scan
    needs: detect-changes
    if: needs.detect-changes.outputs.trivy_fs == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Run Trivy filesystem scan
        uses: aquasecurity/trivy-action@a9c7b0f06e461e9d4b4d1711f154ee024b8d7ab8 # v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          format: table
          exit-code: "1"
          severity: HIGH,CRITICAL
          timeout: ${{ env.TRIVY_TIMEOUT }}

  image-scan:
    name: Docker Build and Image Scan
    needs: detect-changes
    if: needs.detect-changes.outputs.image_scan == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 35
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Build backend image
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          file: backend/Dockerfile
          load: true
          tags: ${{ env.BACKEND_IMAGE }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Run Trivy image scan
        uses: aquasecurity/trivy-action@a9c7b0f06e461e9d4b4d1711f154ee024b8d7ab8 # v0.36.0
        with:
          image-ref: ${{ env.BACKEND_IMAGE }}
          format: table
          exit-code: "1"
          severity: HIGH,CRITICAL
          timeout: ${{ env.TRIVY_TIMEOUT }}

  quality-gate:
    name: Quality Gate
    needs:
      - detect-changes
      - workflow-lint
      - quick
      - integration-e2e
      - govulncheck
      - osv-scan
      - trivy-fs
      - image-scan
    if: always()
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Report job results
        run: |
          echo "detect-changes: ${{ needs.detect-changes.result }}"
          echo "workflow-lint: ${{ needs.workflow-lint.result }}"
          echo "quick: ${{ needs.quick.result }}"
          echo "integration-e2e: ${{ needs.integration-e2e.result }}"
          echo "govulncheck: ${{ needs.govulncheck.result }}"
          echo "osv-scan: ${{ needs.osv-scan.result }}"
          echo "trivy-fs: ${{ needs.trivy-fs.result }}"
          echo "image-scan: ${{ needs.image-scan.result }}"

      - name: Fail on unsuccessful required jobs
        if: contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled')
        run: exit 1
