sonar.projectKey=nexuspaas-backend
sonar.projectName=NexusPaas Backend
sonar.projectVersion=local

sonar.sources=backend
sonar.tests=backend
sonar.test.inclusions=**/*_test.go
sonar.sourceEncoding=UTF-8
sonar.go.coverage.reportPaths=backend/coverage.out
sonar.coverage.exclusions=backend/scripts/perf/**

# Keep the read-only reference snapshot, Docker build metadata, and dev-only
# local runtime config out of Sonar analysis; deployment tests validate them.
sonar.exclusions=references/**,backend/Dockerfile,backend/*/Dockerfile,backend/deploy/k3s/runtime-config.yaml

# Kubernetes manifests are intentionally repetitive: probes, resources,
# selectors, and envFrom contracts must be repeated per workload. Keep IaC and
# secret analysis enabled, but exclude deployment YAML from copy-paste
# detection so the Quality Gate focuses duplication checks on executable code.
sonar.cpd.exclusions=backend/deploy/k3s/**/*.yaml,backend/kustomization.yaml,backend/*/k8s/deployment.yaml
