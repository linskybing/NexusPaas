sonar.projectKey=nexuspaas-backend
sonar.projectName=NexusPaas Backend
sonar.projectVersion=local

sonar.sources=.
sonar.tests=.
sonar.test.inclusions=**/*_test.go
sonar.sourceEncoding=UTF-8
sonar.go.coverage.reportPaths=backend/coverage.out
sonar.coverage.exclusions=backend/scripts/perf/**

# Scan as much first-party code as possible, consistent with the GitHub repo:
# whole-repo sources (backend/, docs/, .github/, root) are analyzed. The only
# source excluded is references/** — the vendored upstream reference backend,
# which is not our code. The remaining entries are generated/gitignored build
# artifacts (a cloned driver cache, the CodeGraph DB, the scanner work dir, npm
# deps, and the Go coverage report) — not source, and never part of the GitHub
# repo tree, so excluding them keeps the local scan consistent with GitHub.
sonar.exclusions=references/**,backend/.cache/**,.codegraph/**,.scannerwork/**,**/node_modules/**,**/coverage.out

# Kubernetes manifests are intentionally repetitive: probes, resources,
# selectors, and envFrom contracts must be repeated per workload. Go table-driven
# tests and typed contract/API JSON fixtures are likewise intentionally repetitive
# (parity tests and fixtures duplicate the same shape per route/event by design).
# SQL migrations are intentionally repetitive too: per-table ALTER/backfill
# (INSERT ... SELECT FROM platform_records ... ON CONFLICT) boilerplate that SQL
# cannot deduplicate without obscuring a reviewable migration.
# Keep IaC and secret analysis enabled, but exclude these non-product files from
# copy-paste detection so the Quality Gate focuses duplication checks on
# executable product code.
sonar.cpd.exclusions=backend/deploy/k3s/**/*.yaml,backend/kustomization.yaml,backend/deploy/reference/per-service/**/*.yaml,backend/migrations/**/*.sql,backend/**/*_test.go,backend/internal/contracts/fixtures/**/*.json
